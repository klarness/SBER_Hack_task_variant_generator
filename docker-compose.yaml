services:
  frontend:
    build:
      context: variant-generator
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: "${VITE_API_BASE_URL:-}"
      VITE_PROXY_TARGET: "${VITE_PROXY_TARGET:-http://core:8080}"
      VITE_DEV_USER_ID: "${VITE_DEV_USER_ID:-11111111-1111-1111-1111-111111111111}"
    ports:
      #- "5173:5173"
      # If localhost resolves to broken IPv6 ::1 on Windows/Docker, use:
      - "127.0.0.1:5173:5173"
    depends_on:
      core:
        condition: service_started
    restart: unless-stopped

  core:
    build:
      context: core
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://postgres:hackpassword@postgres:5432/variants_db?sslmode=disable"
      VALKEY_ADDR: "valkey:6379"
      AI_WORKER_BASE_URL: "${AI_WORKER_BASE_URL:-http://analyze:8000}"
      AI_WORKER_CONCURRENCY: "${AI_WORKER_CONCURRENCY:-1}"
      RATE_LIMIT_CAPACITY: "${RATE_LIMIT_CAPACITY:-30}"
      RATE_LIMIT_REFILL: "${RATE_LIMIT_REFILL:-30}"
      RATE_LIMIT_WINDOW: "${RATE_LIMIT_WINDOW:-1m}"
      DEFAULT_VARIANT_COUNT: "${DEFAULT_VARIANT_COUNT:-2}"
      MAX_UPLOAD_MB: "${MAX_UPLOAD_MB:-32}"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      analyze:
        condition: service_started
    restart: unless-stopped

  analyze:
    build:
      context: analyze
      dockerfile: Dockerfile
    environment:
      GIGACHAT_CREDENTIALS: "${GIGACHAT_CREDENTIALS:-}"
      GIGACHAT_AUTHORIZATION_KEY: "${GIGACHAT_AUTHORIZATION_KEY:-}"
      GIGACHAT_CLIENT_ID: "${GIGACHAT_CLIENT_ID:-}"
      GIGACHAT_CLIENT_SECRET: "${GIGACHAT_CLIENT_SECRET:-}"
      GIGACHAT_SCOPE: "${GIGACHAT_SCOPE:-GIGACHAT_API_PERS}"
      GIGACHAT_MODEL: "${GIGACHAT_MODEL:-GigaChat}"
      GIGACHAT_TIMEOUT: "${GIGACHAT_TIMEOUT:-60.0}"
      GIGACHAT_VERIFY_SSL_CERTS: "${GIGACHAT_VERIFY_SSL_CERTS:-false}"
      GIGACHAT_CONCURRENCY: "${GIGACHAT_CONCURRENCY:-1}"
      TESSERACT_OCR_ENABLED: "${TESSERACT_OCR_ENABLED:-true}"
      TESSERACT_LANG: "${TESSERACT_LANG:-rus+eng}"
      TESSERACT_PSM: "${TESSERACT_PSM:-6}"
      TESSERACT_MIN_CHARS: "${TESSERACT_MIN_CHARS:-25}"
      TESSERACT_MIN_CONFIDENCE: "${TESSERACT_MIN_CONFIDENCE:-65}"
      PDF_MATH_OCR_ENABLED: "${PDF_MATH_OCR_ENABLED:-true}"
      PDF_TESSERACT_OCR_ENABLED: "${PDF_TESSERACT_OCR_ENABLED:-true}"
      PDF_MATH_OCR_DPI: "${PDF_MATH_OCR_DPI:-220}"
    ports:
      - "8000:8000"
    restart: unless-stopped

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: hackpassword
      POSTGRES_DB: variants_db
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d variants_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: ${VALKEY_IMAGE:-valkey/valkey:7.2-alpine}
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    command: valkey-server --save 60 1 --loglevel warning
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    image: ${MIGRATE_IMAGE:-migrate/migrate:v4.17.1}
    volumes:
      - ./core/migrations:/migrations:ro
    command:
      [
        "-path=/migrations",
        "-database=postgres://postgres:hackpassword@postgres:5432/variants_db?sslmode=disable",
        "up"
      ]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  pg_data:
  valkey_data:
