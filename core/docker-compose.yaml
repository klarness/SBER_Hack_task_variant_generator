services:
  core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hack_core
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://postgres:hackpassword@postgres:5432/variants_db?sslmode=disable"
      VALKEY_ADDR: "valkey:6379"
      AI_WORKER_BASE_URL: "${AI_WORKER_BASE_URL:-http://host.docker.internal:8000}"
      RATE_LIMIT_CAPACITY: "${RATE_LIMIT_CAPACITY:-30}"
      RATE_LIMIT_REFILL: "${RATE_LIMIT_REFILL:-30}"
      RATE_LIMIT_WINDOW: "${RATE_LIMIT_WINDOW:-1m}"
      DEFAULT_VARIANT_COUNT: "${DEFAULT_VARIANT_COUNT:-2}"
      MAX_UPLOAD_MB: "${MAX_UPLOAD_MB:-32}"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: hack_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: hackpassword
      POSTGRES_DB: variants_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d variants_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: ${VALKEY_IMAGE:-valkey/valkey:7.2-alpine}
    container_name: hack_valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    command: valkey-server --save 60 1 --loglevel warning
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    image: ${MIGRATE_IMAGE:-migrate/migrate:v4.17.1}
    container_name: hack_migrate
    volumes:
      - ./migrations:/migrations:ro
    command:
      [
        "-path=/migrations",
        "-database=postgres://postgres:hackpassword@postgres:5432/variants_db?sslmode=disable",
        "up"
      ]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  pg_data:
  valkey_data:
